<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kho Thuốc | PharmaOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="database.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232563eb'><path d='M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z'/></svg>"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #f8fafc;
        overflow: hidden;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .sidebar-item.active {
        background-color: #eff6ff;
        color: #2563eb;
        border-right: 3px solid #2563eb;
      }
    </style>
  </head>
  <body class="h-screen flex">
    <aside
      class="w-44 bg-white border-r border-gray-100 flex flex-col shadow-sm"
    >
      <div class="p-4 mb-2">
        <div class="flex items-center gap-2 text-blue-600">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"
            />
          </svg>
          <span
            class="font-extrabold tracking-tighter text-base text-gray-800 uppercase"
            >Pharma<span class="text-blue-600">OS</span></span
          >
        </div>
      </div>

      <nav class="flex-1 space-y-1">
        <a
          href="pos.html"
          class="sidebar-item w-full flex items-center gap-2.5 px-4 py-3.5 text-[10px] font-bold text-gray-400 hover:bg-gray-50 uppercase transition-all"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
            />
          </svg>
          BÁN HÀNG
        </a>

        <div class="w-full">
          <button
            onclick="window.location.href = 'inventory.html'"
            class="sidebar-item active w-full flex items-center justify-between px-4 py-3.5 text-[10px] font-bold text-blue-600 uppercase transition-all hover:bg-gray-50"
          >
            <div class="flex items-center gap-2.5">
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
                />
              </svg>
              KHO THUỐC
            </div>
            <svg
              id="inv-drop-icon"
              onclick="
                event.stopPropagation();
                toggleDrop('inv-drop');
              "
              class="w-3 h-3 transition-transform duration-300 rotate-180"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              />
            </svg>
          </button>
          <div
            id="inv-drop"
            class="bg-blue-50/30 overflow-hidden transition-all duration-300"
          >
            <a
              href="inventory.html"
              class="flex items-center gap-2 pl-11 py-3 text-[9px] font-black text-blue-700 uppercase hover:bg-blue-50 transition-all"
            >
              <span class="w-1 h-1 bg-blue-600 rounded-full"></span>
              TỔNG KHO
            </a>
            <a
              href="import.html"
              class="flex items-center gap-2 pl-11 py-3 text-[9px] font-bold text-gray-400 hover:text-blue-600 hover:bg-blue-50 uppercase transition-all"
            >
              <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
              NHẬP HÀNG
            </a>
          </div>
        </div>
        <a
          href="reports.html"
          class="sidebar-item w-full flex items-center gap-2.5 px-4 py-3.5 text-[10px] font-bold text-gray-400 hover:bg-gray-50 uppercase"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          BÁO CÁO
        </a>
      </nav>

      <div class="p-4 border-t border-gray-50 mt-auto bg-white relative">
        <div
          id="user-menu-btn"
          class="flex items-center gap-2 cursor-pointer hover:bg-gray-50 p-2 -mx-2 rounded-xl transition-colors"
        >
          <div
            id="user-avatar"
            class="h-8 w-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-sm"
          ></div>
          <div class="min-w-0 flex-1">
            <p
              id="user-name-display"
              class="text-[9px] font-bold text-gray-800 truncate uppercase"
            ></p>
            <p
              id="user-role-display"
              class="text-[7px] font-semibold text-gray-400 uppercase tracking-tighter"
            ></p>
          </div>
          <svg
            class="w-4 h-4 text-gray-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 9l-7 7-7-7"
            />
          </svg>
        </div>

        <div
          id="user-dropdown"
          class="hidden absolute bottom-[110%] left-4 right-4 bg-white border border-gray-100 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.08)] overflow-hidden z-50"
        >
          <a
            href="info.html"
            class="block w-full text-left px-4 py-3.5 text-[10px] font-bold text-gray-700 hover:bg-gray-50 uppercase border-b border-gray-50 transition-colors"
          >
            Thông tin
          </a>
          <button
            onclick="AuthManager.logout()"
            class="w-full text-left px-4 py-3.5 text-[10px] font-bold text-red-500 hover:bg-red-50 uppercase transition-colors"
          >
            Đăng xuất
          </button>
        </div>
      </div>
    </aside>

    <main class="flex-1 p-6 overflow-hidden flex flex-col">
      <div
        class="bg-white rounded-2xl border border-gray-100 shadow-sm h-full flex flex-col overflow-hidden transition-all hover:shadow-md"
      >
        <div
          class="flex-1 overflow-hidden flex flex-col bg-white rounded-[32px] m-4 shadow-sm border border-gray-100"
        >
          <div
            class="p-3 border-b border-gray-50 flex justify-between items-center"
          >
            <h2
              class="font-black text-gray-800 uppercase tracking-tighter text-xl"
            >
              Báo cáo tổng kho
            </h2>

            <div
              class="bg-white p-4 px-6 rounded-2xl border border-gray-100 shadow-sm border-r-4 border-r-blue-400 min-w-[220px] text-right"
            >
              <p
                class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1"
              >
                Tổng lợi nhuận dự tính
              </p>
              <div class="flex items-baseline justify-end gap-1">
                <p
                  id="total-inventory-profit"
                  class="text-2xl font-black text-blue-600 tracking-tighter"
                >
                  0
                </p>
                <span class="text-xs font-bold text-blue-400 uppercase"
                  >vnđ</span
                >
              </div>
            </div>
          </div>

          <div class="flex-1 overflow-auto custom-scrollbar">
            <table class="w-full text-left border-collapse min-w-[1200px]">
              <thead class="sticky top-0 bg-white shadow-sm z-10">
                <tr class="border-b border-gray-100">
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase text-center"
                  >
                    STT
                  </th>
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase"
                  >
                    Tên thuốc
                  </th>
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase text-center"
                  >
                    ĐVT
                  </th>
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase text-right"
                  >
                    Giá Nhập
                  </th>
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase text-right"
                  >
                    Giá Bán
                  </th>
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase text-center"
                  >
                    Tồn Đầu
                  </th>
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase text-center"
                  >
                    Tổng Nhập
                  </th>
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase text-center"
                  >
                    Tổng Xuất
                  </th>
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase text-center"
                  >
                    Tồn Kho
                  </th>
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase text-right w-20"
                  >
                    Lợi Nhuận
                  </th>
                  <th
                    class="px-2 py-2 text-[10px] font-black text-gray-400 uppercase text-center"
                  >
                    Ghi chú
                  </th>
                </tr>
              </thead>
              <tbody id="inventory-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
    <script>
      function toggleDrop(id) {
        const drop = document.getElementById(id);
        const icon = document.getElementById(id + "-icon");

        if (drop.classList.contains("hidden")) {
          drop.classList.remove("hidden");
          icon.classList.add("rotate-180");
        } else {
          drop.classList.add("hidden");
          icon.classList.remove("rotate-180");
        }
      }

      document.addEventListener("DOMContentLoaded", async () => {
        if (typeof AuthManager !== "undefined") AuthManager.checkSession();
        renderTotalInventory();
      });

      // Hàm xử lý cập nhật giá bán mới
      async function updateSellPrice(id, currentPrice, name) {
        const newPrice = prompt(
          `Cập nhật giá bán cho: ${name.toUpperCase()}`,
          currentPrice,
        );

        if (newPrice !== null && newPrice.trim() !== "") {
          const parsedPrice = parseInt(newPrice.replace(/[^0-9]/g, ""));
          if (!isNaN(parsedPrice)) {
            try {
              await db.products.update(id, { sell_price: parsedPrice });
              renderTotalInventory();
            } catch (error) {
              console.error("Lỗi khi cập nhật giá:", error);
            }
          } else {
            alert("Vui lòng nhập số hợp lệ!");
          }
        }
      }

      async function renderTotalInventory() {
        const list = document.getElementById("inventory-tbody");
        const totalProfitDisplay = document.getElementById(
          "total-inventory-profit",
        );
        if (!list) return;

        try {
          const products = await db.products.toArray();

          if (products.length === 0) {
            list.innerHTML = `<tr><td colspan="11" class="py-20 text-center text-gray-400 font-bold uppercase text-xs">Kho trống - Vui lòng nhập hàng</td></tr>`;
            if (totalProfitDisplay) totalProfitDisplay.innerText = "0";
            return;
          }

          let totalAllProfit = 0;

          list.innerHTML = products
            .map((item, index) => {
              const importPrice = item.import_price || 0;
              const sellPrice = item.sell_price || 0;
              const exported = item.total_export || 0;
              const profit = (sellPrice - importPrice) * exported;

              totalAllProfit += profit;

              return `
            <tr class="hover:bg-blue-50/20 transition-colors border-b border-gray-50 group">
                <td class="px-2 py-1.5 text-center text-[11px] font-medium text-gray-800">${index + 1}</td>
                <td class="px-2 py-1.5">
                    <p class="font-semibold text-gray-800 uppercase text-[11px] leading-tight">${item.name}</p>
                </td>
                <td class="px-2 py-1.5 text-center text-gray-800 font-medium text-[11px]">${item.type || "---"}</td>
                
                <td class="px-2 py-1.5 text-right font-medium text-gray-800 text-[11px]">${importPrice.toLocaleString()}</td>
                
                <td class="px-2 py-1.5 text-right font-bold text-blue-600 text-[11px]">
                    <div class="flex items-center justify-end gap-1.5">
                        <span>${sellPrice.toLocaleString()}</span>
                        <button 
                            onclick="updateSellPrice(${item.id}, ${sellPrice}, '${item.name}')"
                            class="p-1 bg-blue-50 hover:bg-blue-100 rounded-md text-blue-500 transition-colors shadow-sm"
                            title="Sửa giá bán"
                        >
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                        </button>
                    </div>
                </td>
                
                <td class="px-2 py-1.5 text-center font-medium text-gray-800 text-[11px]">${item.stock_initial || 0}</td>
                <td class="px-2 py-1.5 text-center font-bold text-green-500 text-[11px]">${item.total_import || 0}</td>
                <td class="px-2 py-1.5 text-center font-medium text-gray-800 text-[11px]">${exported}</td>
                
                <td class="px-2 py-1.5 text-center bg-gray-50/50">
                    <span class="font-black text-red-500 text-[11px]">${item.stock || 0}</span>
                </td>
                
                <td class="px-2 py-1.5 text-right font-black text-green-600 text-[11px]">
                    ${profit > 0 ? profit.toLocaleString() : "0"}đ
                </td>
                
                <td class="px-2 py-1.5 text-[11px] italic text-gray-300 font-medium whitespace-nowrap">${item.note || ""}</td>
            </tr>
        `;
            })
            .join("");

          if (totalProfitDisplay) {
            totalProfitDisplay.innerText = totalAllProfit.toLocaleString();
          }
        } catch (error) {
          console.error("Lỗi khi load kho:", error);
        }
      }
    </script>
  </body>
</html>
