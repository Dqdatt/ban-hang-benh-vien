            </div>
            <div

            >
              <p

                <div class="w-1 h-3 bg-blue-600 rounded-full"></div>

                  Doanh thu Ngày
                </h4>
              </div>
              <div class="p-6 text-right">
                <p id="revenue-day" class="text-3xl font-black text-blue-600">
                  0đ

              </div>
            </div>
            <div
              class="bg-white rounded-[32px] border border-gray-100 shadow-sm overflow-hidden"
            >
              <div
                class="p-4 bg-purple-50/50 border-b border-gray-50 flex items-center gap-2"
              >
                <div class="w-1 h-3 bg-purple-600 rounded-full"></div>

            <div

                <div class="w-1 h-3 bg-green-600 rounded-full"></div>

                  stroke-linejoin="round"

          >
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-gray-50/50">
                  <th
                    class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase text-center w-16"

                  <th

                  </th>

                    Mã đơn

                    Tổng tiền
                  </th>
                  <th
                    class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase text-center"
                  >
                    PTTT
                  </th>
                  <th
                    class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase text-center"

    <div
      id="invoice-detail-modal"
      class="fixed inset-0 z-[100] hidden bg-gray-900/40 backdrop-blur-md flex items-center justify-center p-6"
    >
      <div
        id="invoice-detail-content"
        class="bg-white rounded-[40px] shadow-2xl w-full max-w-2xl overflow-hidden p-8 animate-in zoom-in duration-300"
      ></div>
    </div>

    <script>
      // 1. CHUYỂN TAB & KHỞI TẠO
      function switchTab(tabName) {
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => t.classList.add("hidden"));
        document.getElementById(`tab-${tabName}`).classList.remove("hidden");
        document.querySelectorAll(".tab-btn").forEach((b) => {
          b.classList.remove("bg-white", "text-blue-600", "shadow-sm");
          b.classList.add("text-gray-400");
        });
        const activeBtn = document.getElementById(`btn-${tabName}`);
        activeBtn.classList.add("bg-white", "text-blue-600", "shadow-sm");
        activeBtn.classList.remove("text-gray-400");

        if (tabName === "overview") updateDashboardStats();
        if (tabName === "logistics") updateLogisticsTab();
        if (tabName === "invoices") loadInvoices();
      }

      // 2. LOGIC THỐNG KÊ DOANH THU & ĐƠN HÀNG
      async function updateDashboardStats() {
        try {
          const orders = await db.orders.toArray();
          const now = new Date();
          const curD = now.getDate(),
            curM = now.getMonth(),
            curY = now.getFullYear();

          let totalRev = 0,
            revDay = 0,
            revMonth = 0,
            revYear = 0;

          orders.forEach((o) => {
            const amt = Number(o.total_amount) || 0;
            const d = new Date(o.created_at);
            totalRev += amt;
            if (d.getFullYear() === curY) {
              revYear += amt;
              if (d.getMonth() === curM) {
                revMonth += amt;
                if (d.getDate() === curD) revDay += amt;
              }
            }
          });

          const fmt = (v) => v.toLocaleString() + "đ";
          document.getElementById("total-revenue-display").innerText =
            fmt(totalRev);
          document.getElementById("total-orders-count").innerText =
            `${orders.length} Đơn`;
          document.getElementById("revenue-day").innerText = fmt(revDay);
          document.getElementById("revenue-month").innerText = fmt(revMonth);
          document.getElementById("revenue-year").innerText = fmt(revYear);
        } catch (e) {
          console.error(e);
        }
      }

      // 3. LOGIC KHO VẬN
      async function updateLogisticsTab() {
        try {
          const prods = await db.products.toArray();
          document.getElementById("total-medicines-count").innerText =
            `${prods.length} Loại`;

          document.getElementById("inventory-table-body").innerHTML = prods
            .map(
              (p, i) => `
            <tr class="hover:bg-gray-50/50 border-b border-gray-50 transition-all">
              <td class="px-6 py-2 text-[11px] font-medium text-gray-400 text-center">${i + 1}</td>
              <td class="px-6 py-2 text-[11px] font-black text-gray-800 uppercase">${p.name}</td>
              <td class="px-6 py-2 text-[11px] font-bold text-gray-600 text-center">${p.type}</td>
              <td class="px-6 py-2 text-right"><span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-lg font-black text-[11px]">${p.stock || 0}</span></td>
            </tr>`,
            )
            .join("");

          const low = prods.filter((p) => (p.stock || 0) <= 5);
          document.getElementById("low-stock-table-body").innerHTML = low.length
            ? low
                .map(
                  (p) => `
            <tr class="hover:bg-red-50/30 border-b border-gray-50 transition-all">
              <td class="px-6 py-4 text-[11px] font-black text-gray-800 uppercase">${p.name}</td>
              <td class="px-6 py-4 text-right"><span class="px-3 py-1 bg-red-50 text-red-600 rounded-lg font-black text-[11px]">${p.stock || 0}</span></td>
            </tr>`,
                )
                .join("")
            : '<tr><td class="p-6 text-[10px] text-gray-400 text-center font-bold uppercase italic">Kho hàng ổn định</td></tr>';
        } catch (e) {
          console.error(e);
        }
      }

      // 4. LOGIC HÓA ĐƠN & CHI TIẾT
      async function loadInvoices() {
        const keyword =
          document
            .getElementById("invoice-search-input")
            ?.value?.toUpperCase() || "";

        let orders = await db.orders.orderBy("created_at").reverse().toArray();

        // Lọc theo mã đơn nếu có keyword
        if (keyword) {
          orders = orders.filter((o) =>
            o.order_id.toUpperCase().includes(keyword),
          );
        }

        document.getElementById("invoice-list-body").innerHTML =
          orders
            .map(
              (o, i) => `
          <tr class="hover:bg-gray-50/50 border-b border-gray-50 transition-all">
            <td class="px-6 py-4 text-[11px] font-medium text-gray-400 text-center">${i + 1}</td>
            <td class="px-6 py-4 text-[11px] font-medium text-gray-500">${new Date(o.created_at).toLocaleString()}</td>
            <td class="px-6 py-4 text-[11px] font-black text-gray-800 uppercase">${o.order_id}</td>
            <td class="px-6 py-4 text-right text-[11px] font-black text-blue-600">${Number(o.total_amount).toLocaleString()}đ</td>
            <td class="px-6 py-4 text-center">
              <span class="px-3 py-1 ${o.payment_type === "Chuyển khoản" ? "bg-blue-50 text-blue-600" : "bg-gray-100 text-gray-600"} rounded-lg font-black text-[9px] uppercase tracking-tighter">
                ${o.payment_type || "Tiền mặt"}
              </span>
            </td>
            <td class="px-6 py-4 text-center">
              <button onclick="viewInvoice('${o.order_id}')" class="text-[10px] font-black text-gray-400 hover:text-blue-600 uppercase tracking-widest transition-colors">Chi tiết</button>
            </td>
          </tr>`,
            )
            .join("") ||
          '<tr><td colspan="6" class="p-12 text-[10px] text-gray-400 text-center font-bold uppercase italic">Không tìm thấy hóa đơn phù hợp</td></tr>';
      }

      async function viewInvoice(id) {
        const order = await db.orders.get(id);
        const items = await db.order_items
          .where("order_id")
          .equals(id)
          .toArray();

        const modal = document.getElementById("invoice-detail-modal");
        const content = document.getElementById("invoice-detail-content");

        let itemsHtml = items
          .map(
            (it) => `
          <div class="flex justify-between py-2 border-b border-gray-50">
            <span class="text-[11px] font-bold text-gray-600 uppercase">${it.product_id} (x${it.quantity})</span>
            <span class="text-[11px] font-black text-gray-800">${(it.price * it.quantity).toLocaleString()}đ</span>
          </div>`,
          )
          .join("");

        content.innerHTML = `
          <div class="flex justify-between items-start mb-8">
            <div>
              <h2 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">Chi tiết hóa đơn</h2>
              <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${order.order_id}</p>
            </div>
            <button onclick="closeInvoiceModal()" class="text-gray-300 hover:text-red-500 text-xl">✕</button>
          </div>
          <div class="space-y-1 mb-8 max-h-60 overflow-y-auto custom-scrollbar pr-2">${itemsHtml}</div>
          <div class="flex justify-between items-center bg-gray-50 p-6 rounded-[24px] mb-8">
            <span class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Tổng thanh toán</span>
            <span class="text-3xl font-black text-blue-600">${Number(order.total_amount).toLocaleString()}đ</span>
          </div>
          
          <div class="flex gap-4">
            ${
              order.payment_type === "Chuyển khoản"
                ? `
            <button onclick="reOpenQR(${order.total_amount})" 
                    class="flex-1 bg-blue-600 text-white py-5 rounded-2xl text-[13px] font-black uppercase shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                XEM MÃ QR
            </button>`
                : ""
            }
            <button onclick="closeInvoiceModal()" class="flex-1 bg-gray-100 text-gray-500 py-5 rounded-2xl text-[13px] font-black uppercase hover:bg-gray-200 transition-all">Đóng</button>
          </div>
        `;
        modal.classList.remove("hidden");
      }

      function closeInvoiceModal() {
        document.getElementById("invoice-detail-modal").classList.add("hidden");
      }

      // 5. POPUP QR (NHÚNG TRỰC TIẾP - MỜ NHẸ - KHÔNG NÚT XÁC NHẬN)
      function reOpenQR(soTien) {
        let qrModal = document.getElementById("re-qr-modal");
        if (!qrModal) {
          const modalHTML = `
            <div id="re-qr-modal" class="fixed inset-0 z-[200] hidden bg-gray-900/40 backdrop-blur-md flex items-center justify-center p-6">
              <div class="bg-white rounded-[48px] shadow-2xl w-full max-w-md overflow-hidden p-8 flex flex-col items-center animate-in zoom-in duration-300">
                <h2 class="text-xl font-black text-gray-800 uppercase mb-2">Quét mã thanh toán</h2>
                <p class="text-xs text-gray-400 font-bold mb-6 tracking-widest uppercase text-center">VietQR - Chuyển khoản 24/7</p>
                <div class="relative w-full aspect-square bg-gray-50 rounded-[32px] border-4 border-blue-50 flex items-center justify-center overflow-hidden mb-6 shadow-inner">
                  <img id="re-qr-image" src="" alt="VietQR" class="w-full h-full object-contain p-4 opacity-0 transition-opacity duration-300" />
                  <div id="re-qr-loading" class="absolute inset-0 flex items-center justify-center bg-gray-50">
                    <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                  </div>
                </div>
                <div class="text-center w-full bg-blue-50/50 py-5 rounded-2xl mb-4">
                  <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Số tiền cần thu</p>
                  <p id="re-qr-amount-display" class="text-3xl font-black text-blue-600">0đ</p>
                </div>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest italic text-center opacity-50">Chạm vùng ngoài để đóng</p>
              </div>
            </div>`;
          document.body.insertAdjacentHTML("beforeend", modalHTML);
          qrModal = document.getElementById("re-qr-modal");
        }

        const qrImg = document.getElementById("re-qr-image"),
          qrLoad = document.getElementById("re-qr-loading"),
          qrAmt = document.getElementById("re-qr-amount-display");
        const bankId = "970437",
          accountNo = "045704070016757",
          template = "compact2",
          accountName = "BENH%20VIEN%20DA%20KHOA%20BUU%20DIEN",
          description = "%20CK%20TIEN%20THUOC%20CS1",
          tenKH = "KHACH%20HANG";

        qrImg.classList.add("opacity-0");
        qrLoad.classList.remove("hidden");
        qrAmt.innerText = soTien.toLocaleString() + "đ";
        qrImg.src = `https://img.vietqr.io/image/${bankId}-${accountNo}-${template}.png?amount=${soTien}&addInfo=${tenKH}${description}&accountName=${accountName}`;
        qrImg.onload = () => {
          qrImg.classList.replace("opacity-0", "opacity-100");
          qrLoad.classList.add("hidden");
        };

        qrModal.classList.remove("hidden");
        qrModal.onclick = (e) => {
          if (e.target === qrModal) qrModal.classList.add("hidden");
        };
      }

      window.addEventListener("DOMContentLoaded", () => {
        document.getElementById("current-date").innerText =
          new Date().toLocaleDateString("vi-VN", {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric",
          });
        updateDashboardStats();
      });
    </script>
  </body>
</html>
