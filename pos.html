<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS | PharmaOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #f8fafc;
        overflow: hidden;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .sidebar-item.active {
        background-color: #eff6ff;
        color: #2563eb;
        border-right: 3px solid #2563eb;
      }
    </style>
  </head>
  <body class="h-screen flex">
    <aside
      class="w-44 bg-white border-r border-gray-100 flex flex-col shadow-sm"
    >
      <div class="p-4 mb-2">
        <div class="flex items-center gap-2 text-blue-600">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"
            />
          </svg>
          <span class="font-extrabold tracking-tighter text-base text-gray-800"
            >PHARMA<span class="text-blue-600">OS</span></span
          >
        </div>
      </div>

      <nav class="flex-1 space-y-1">
        <a
          href="pos.html"
          class="sidebar-item active w-full flex items-center gap-2.5 px-4 py-3.5 text-[10px] font-bold text-blue-600 uppercase"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
            />
          </svg>
          BÁN HÀNG
        </a>
        <a
          href="inventory.html"
          class="sidebar-item w-full flex items-center gap-2.5 px-4 py-3.5 text-[10px] font-bold text-gray-400 hover:bg-gray-50 uppercase"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
            />
          </svg>
          KHO THUỐC
        </a>
        <a
          href="reports.html"
          class="sidebar-item w-full flex items-center gap-2.5 px-4 py-3.5 text-[10px] font-bold text-gray-400 hover:bg-gray-50 uppercase"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          BÁO CÁO
        </a>
      </nav>

      <div class="p-4 border-t border-gray-50 mt-auto">
        <div class="flex items-center gap-2">
          <div
            class="h-8 w-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-sm"
          >
            D
          </div>
          <div class="min-w-0">
            <p class="text-[9px] font-bold text-gray-800 truncate">
              DOAN QUOC DAT
            </p>
            <p
              class="text-[7px] font-semibold text-gray-400 uppercase tracking-tight"
            >
              Dược sĩ trực
            </p>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-1 flex overflow-hidden p-4 gap-4">
      <section
        class="w-[42%] flex flex-col bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden"
      >
        <div class="p-4 border-b border-gray-50 space-y-3">
          <div class="flex gap-2">
            <button
              onclick="orderManager.newOrder()"
              class="flex-1 bg-blue-600 text-white py-2.5 rounded-xl font-bold text-[10px] uppercase hover:bg-blue-700 transition-all shadow-md"
            >
              Tạo đơn mới
            </button>
            <button
              onclick="orderManager.clearOrder()"
              class="flex-1 border border-red-100 text-red-500 py-2.5 rounded-xl font-bold text-[10px] uppercase hover:bg-red-50 transition-all"
            >
              Xóa đơn hiện tại
            </button>
          </div>
          <div class="relative">
            <input
              type="text"
              id="search-input"
              placeholder="Tìm tên thuốc hoặc mã..."
              class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-11 pr-4 outline-none focus:ring-2 focus:ring-blue-500 text-sm font-semibold"
            />
            <svg
              class="h-5 w-5 absolute left-4 top-3.5 text-gray-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-2">
          <table class="w-full text-left">
            <thead
              class="text-[9px] font-bold text-gray-400 uppercase border-b border-gray-50 italic tracking-widest"
            >
              <tr>
                <th class="px-3 py-2">Sản phẩm</th>
                <th class="px-3 py-2 w-20 text-center">Số lượng</th>
                <th class="px-3 py-2 text-right">Thêm</th>
              </tr>
            </thead>
            <tbody id="inventory-list" class="text-xs"></tbody>
          </table>
        </div>
      </section>

      <section
        class="flex-1 flex flex-col bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden"
      >
        <div
          class="p-4 border-b border-gray-50 flex justify-between items-center bg-gray-50/20"
        >
          <h3 class="font-bold text-gray-800 text-xs uppercase tracking-widest">
            Giỏ hàng hiện tại
          </h3>
          <span
            id="order-id"
            class="text-[11px] font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded transition-all tracking-tight"
          >
            ĐỢI LỆNH
          </span>
        </div>
        <div class="flex-1 overflow-y-auto custom-scrollbar">
          <table class="w-full">
            <tbody id="cart-list" class="divide-y divide-gray-50"></tbody>
          </table>
        </div>
      </section>

      <section class="w-1/4 flex flex-col gap-4">
        <div
          class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-4"
        >
          <div
            class="flex justify-between items-center text-[10px] font-bold text-gray-400 uppercase tracking-widest"
          >
            <span>Tạm tính</span>
            <span id="total-price" class="text-gray-800 font-black text-sm"
              >0đ</span
            >
          </div>
          <div
            class="border-t border-dashed border-gray-200 pt-4 flex flex-col gap-1"
          >
            <span
              class="text-[10px] font-bold text-blue-600 uppercase tracking-widest"
              >Tổng thu</span
            >
            <span
              id="grand-total"
              class="text-3xl font-extrabold text-blue-600 tracking-tighter"
              >0đ</span
            >
          </div>
        </div>

        <div
          class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex-1 flex flex-col"
        >
          <button
            onclick="orderManager.openPaymentModal()"
            class="w-full h-full bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-2xl shadow-lg shadow-blue-100 uppercase transition-all flex items-center justify-center"
          >
            Thanh toán
          </button>
        </div>
      </section>
    </main>
    <script src="pos.js"></script>
  </body>
</html>
