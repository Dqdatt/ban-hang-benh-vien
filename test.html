<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Báo cáo | PharmaOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="database.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #f8fafc;
        overflow: hidden;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .sidebar-item.active {
        background-color: #eff6ff;
        color: #2563eb;
        border-right: 3px solid #2563eb;
      }
    </style>
  </head>
  <body class="h-screen flex">
    <aside
      class="w-44 bg-white border-r border-gray-100 flex flex-col shadow-sm"
    >
      <div class="p-4 mb-2">
        <div class="flex items-center gap-2 text-blue-600">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"
            />
          </svg>
          <span
            class="font-extrabold tracking-tighter text-base text-gray-800 uppercase"
            >Pharma<span class="text-blue-600">OS</span></span
          >
        </div>
      </div>

      <nav class="flex-1 space-y-1">
        <a
          href="pos.html"
          class="sidebar-item w-full flex items-center gap-2.5 px-4 py-3.5 text-[10px] font-bold text-gray-400 hover:bg-gray-50 uppercase transition-all"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
            />
          </svg>
          BÁN HÀNG
        </a>
        <a
          href="inventory.html"
          class="sidebar-item w-full flex items-center gap-2.5 px-4 py-3.5 text-[10px] font-bold text-gray-400 hover:bg-gray-50 uppercase transition-all"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
            />
          </svg>
          KHO THUỐC
        </a>
        <a
          href="reports.html"
          class="sidebar-item active w-full flex items-center gap-2.5 px-4 py-3.5 text-[10px] font-bold text-blue-600 uppercase transition-all"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          BÁO CÁO
        </a>
      </nav>

      <div
        class="p-4 border-t border-gray-50 mt-auto bg-white relative text-center"
      >
        <p class="text-[9px] font-bold text-gray-300 uppercase italic">
          PharmaOS v1.0
        </p>
      </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
      <header
        class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-8 shrink-0"
      >
        <div class="flex items-center gap-4">
          <h1
            class="text-lg font-black text-gray-800 uppercase tracking-tighter"
          >
            Trung tâm dữ liệu
          </h1>
          <div class="h-4 w-[1px] bg-gray-200"></div>
          <p
            id="current-date"
            class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"
          ></p>
        </div>
      </header>

      <div class="flex-1 overflow-y-auto custom-scrollbar p-8">
        <div class="flex gap-4 mb-8 bg-gray-100/50 p-1.5 rounded-[20px] w-fit">
          <button
            onclick="switchTab('overview')"
            id="btn-overview"
            class="tab-btn px-8 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all bg-white text-blue-600 shadow-sm"
          >
            Tổng quan
          </button>
          <button
            onclick="switchTab('logistics')"
            id="btn-logistics"
            class="tab-btn px-8 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all text-gray-400 hover:text-gray-600"
          >
            Kho vận
          </button>
          <button
            onclick="switchTab('invoices')"
            id="btn-invoices"
            class="tab-btn px-8 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all text-gray-400 hover:text-gray-600"
          >
            Hóa đơn
          </button>
        </div>

        <div id="tab-overview" class="tab-content space-y-8">
          <div class="grid grid-cols-4 gap-6">
            <div
              class="bg-white p-6 rounded-[32px] border border-gray-100 shadow-sm"
            >
              <p
                class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-1"
              >
                Tổng doanh thu
              </p>
              <p
                id="total-revenue-display"
                class="text-3xl font-black text-blue-600"
              >
                0đ
              </p>
            </div>
            <div
              class="bg-white p-6 rounded-[32px] border border-gray-100 shadow-sm"
            >
              <p
                class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-1"
              >
                Tổng hóa đơn
              </p>
              <p
                id="total-orders-count"
                class="text-3xl font-black text-gray-800"
              >
                0 Đơn
              </p>
            </div>
          </div>

          <div class="grid grid-cols-3 gap-6">
            <div
              class="bg-white rounded-[32px] border border-gray-100 shadow-sm overflow-hidden"
            >
              <div
                class="p-4 bg-blue-50/50 border-b border-gray-50 flex items-center gap-2"
              >
                <div class="w-1 h-3 bg-blue-600 rounded-full"></div>
                <h4
                  class="text-[11px] font-black text-gray-800 uppercase tracking-widest"
                >
                  Doanh thu Ngày
                </h4>
              </div>
              <div class="p-6 text-right">
                <p id="revenue-day" class="text-3xl font-black text-blue-600">
                  0đ
                </p>
              </div>
            </div>
            <div
              class="bg-white rounded-[32px] border border-gray-100 shadow-sm overflow-hidden"
            >
              <div
                class="p-4 bg-purple-50/50 border-b border-gray-50 flex items-center gap-2"
              >
                <div class="w-1 h-3 bg-purple-600 rounded-full"></div>
                <h4
                  class="text-[11px] font-black text-gray-800 uppercase tracking-widest"
                >
                  Doanh thu Tháng
                </h4>
              </div>
              <div class="p-6 text-right">
                <p
                  id="revenue-month"
                  class="text-3xl font-black text-purple-600"
                >
                  0đ
                </p>
              </div>
            </div>
            <div
              class="bg-white rounded-[32px] border border-gray-100 shadow-sm overflow-hidden"
            >
              <div
                class="p-4 bg-green-50/50 border-b border-gray-50 flex items-center gap-2"
              >
                <div class="w-1 h-3 bg-green-600 rounded-full"></div>
                <h4
                  class="text-[11px] font-black text-gray-800 uppercase tracking-widest"
                >
                  Doanh thu Năm
                </h4>
              </div>
              <div class="p-6 text-right">
                <p id="revenue-year" class="text-3xl font-black text-green-600">
                  0đ
                </p>
              </div>
            </div>
          </div>
        </div>

        <div id="tab-logistics" class="tab-content hidden space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div
              class="md:col-span-2 bg-white rounded-[32px] border border-gray-100 shadow-sm overflow-hidden"
            >
              <div
                class="p-6 border-b border-gray-50 flex justify-between items-center"
              >
                <h3
                  class="font-black text-gray-800 uppercase text-sm tracking-widest"
                >
                  Toàn bộ kho hàng
                </h3>
                <span
                  id="total-medicines-count"
                  class="px-4 py-3 bg-green-100 rounded-full text-[15px] font-black text-gray-500 uppercase"
                  >0 Loại</span
                >
              </div>
              <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                  <thead>
                    <tr class="bg-gray-50/50">
                      <th
                        class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase text-center w-16"
                      >
                        STT
                      </th>
                      <th
                        class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase"
                      >
                        Tên thuốc
                      </th>
                      <th
                        class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase text-center"
                      >
                        Đơn vị
                      </th>
                      <th
                        class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase text-right"
                      >
                        Tồn kho
                      </th>
                    </tr>
                  </thead>
                  <tbody id="inventory-table-body"></tbody>
                </table>
              </div>
            </div>
            <div
              class="bg-white rounded-[32px] border border-red-100 shadow-sm overflow-hidden"
            >
              <div class="p-6 bg-red-50/50 border-b border-red-100">
                <h3
                  class="font-black text-red-600 uppercase text-sm tracking-widest flex items-center gap-2"
                >
                  <span
                    class="w-2 h-2 bg-red-500 rounded-full animate-ping"
                  ></span>
                  Sắp hết hàng
                </h3>
              </div>
              <table class="w-full text-left border-collapse">
                <tbody id="low-stock-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="tab-invoices" class="tab-content hidden space-y-4">
          <div class="flex">
            <div class="relative w-64">
              <input
                type="text"
                id="invoice-search-input"
                oninput="loadInvoices()"
                placeholder="TÌM MÃ ĐƠN HÀNG..."
                class="w-full bg-white border border-gray-100 px-4 py-2.5 rounded-2xl text-[10px] font-bold text-gray-800 uppercase tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-100 shadow-sm transition-all"
              />
              <svg
                class="w-4 h-4 text-gray-300 absolute right-4 top-2.5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                />
              </svg>
            </div>
          </div>
          <div
            class="bg-white rounded-[32px] border border-gray-100 shadow-sm overflow-hidden"
          >
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-gray-50/50">
                  <th
                    class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase text-center w-16"
                  >
                    STT
                  </th>
                  <th
                    class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase"
                  >
                    Ngày tạo
                  </th>
                  <th
                    class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase"
                  >
                    Mã đơn
                  </th>
                  <th
                    class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase text-right"
                  >
                    Tổng tiền
                  </th>
                  <th
                    class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase text-center"
                  >
                    PTTT
                  </th>
                  <th
                    class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase text-center"
                  >
                    Thao tác
                  </th>
                </tr>
              </thead>
              <tbody id="invoice-list-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div
      id="invoice-detail-modal"
      class="fixed inset-0 z-[100] hidden bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4"
    >
      <div
        id="invoice-detail-content"
        class="bg-white rounded-2xl shadow-xl w-full max-w-xl overflow-hidden animate-in fade-in zoom-in duration-200"
      ></div>
    </div>

    <script>
      // CHUYỂN TAB
      function switchTab(tabName) {
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => t.classList.add("hidden"));
        document.getElementById(`tab-${tabName}`).classList.remove("hidden");
        document.querySelectorAll(".tab-btn").forEach((b) => {
          b.classList.remove("bg-white", "text-blue-600", "shadow-sm");
          b.classList.add("text-gray-400");
        });
        const activeBtn = document.getElementById(`btn-${tabName}`);
        activeBtn.classList.add("bg-white", "text-blue-600", "shadow-sm");
        activeBtn.classList.remove("text-gray-400");

        if (tabName === "overview") updateDashboardStats();
        if (tabName === "logistics") updateLogisticsTab();
        if (tabName === "invoices") loadInvoices();
      }

      // THỐNG KÊ (LOGIC TỪ TESTREPORT)
      async function updateDashboardStats() {
        try {
          const orders = await db.orders.toArray();
          const now = new Date();
          const curD = now.getDate(),
            curM = now.getMonth(),
            curY = now.getFullYear();
          let totalRev = 0,
            revDay = 0,
            revMonth = 0,
            revYear = 0;

          orders.forEach((o) => {
            const amt = Number(o.total_amount) || 0;
            const d = new Date(o.created_at);
            totalRev += amt;
            if (d.getFullYear() === curY) {
              revYear += amt;
              if (d.getMonth() === curM) {
                revMonth += amt;
                if (d.getDate() === curD) revDay += amt;
              }
            }
          });

          const fmt = (v) => v.toLocaleString() + "đ";
          document.getElementById("total-revenue-display").innerText =
            fmt(totalRev);
          document.getElementById("total-orders-count").innerText =
            `${orders.length} Đơn`;
          document.getElementById("revenue-day").innerText = fmt(revDay);
          document.getElementById("revenue-month").innerText = fmt(revMonth);
          document.getElementById("revenue-year").innerText = fmt(revYear);
        } catch (e) {
          console.error(e);
        }
      }

      // KHO VẬN
      async function updateLogisticsTab() {
        try {
          const prods = await db.products.toArray();
          document.getElementById("total-medicines-count").innerText =
            `${prods.length} Loại`;
          document.getElementById("inventory-table-body").innerHTML = prods
            .map(
              (p, i) => `
            <tr class="hover:bg-gray-50/50 border-b border-gray-50 transition-all">
              <td class="px-6 py-2 text-[11px] font-medium text-gray-400 text-center">${i + 1}</td>
              <td class="px-6 py-2 text-[11px] font-black text-gray-800 uppercase">${p.name}</td>
              <td class="px-6 py-2 text-[11px] font-bold text-gray-600 text-center">${p.type}</td>
              <td class="px-6 py-2 text-right"><span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-lg font-black text-[11px]">${p.stock || 0}</span></td>
            </tr>`,
            )
            .join("");

          const low = prods.filter((p) => (p.stock || 0) <= 5);
          document.getElementById("low-stock-table-body").innerHTML = low.length
            ? low
                .map(
                  (p) => `
            <tr class="hover:bg-red-50/30 border-b border-gray-50 transition-all">
              <td class="px-6 py-4 text-[11px] font-black text-gray-800 uppercase">${p.name}</td>
              <td class="px-6 py-4 text-right"><span class="px-3 py-1 bg-red-50 text-red-600 rounded-lg font-black text-[11px]">${p.stock || 0}</span></td>
            </tr>`,
                )
                .join("")
            : '<tr><td class="p-6 text-[10px] text-gray-400 text-center font-bold uppercase italic">Kho hàng ổn định</td></tr>';
        } catch (e) {
          console.error(e);
        }
      }

      // HÓA ĐƠN
      async function loadInvoices() {
        const keyword =
          document
            .getElementById("invoice-search-input")
            ?.value?.toUpperCase() || "";
        let orders = await db.orders.orderBy("created_at").reverse().toArray();
        if (keyword)
          orders = orders.filter((o) =>
            o.order_id.toUpperCase().includes(keyword),
          );

        document.getElementById("invoice-list-body").innerHTML = orders
          .map(
            (o, i) => `
          <tr class="hover:bg-gray-50/50 border-b border-gray-50 transition-all">
            <td class="px-6 py-4 text-[11px] font-medium text-gray-400 text-center">${i + 1}</td>
            <td class="px-6 py-4 text-[11px] font-medium text-gray-500">${new Date(o.created_at).toLocaleString()}</td>
            <td class="px-6 py-4 text-[11px] font-black text-gray-800 uppercase">${o.order_id}</td>
            <td class="px-6 py-4 text-right text-[11px] font-black text-blue-600">${Number(o.total_amount).toLocaleString()}đ</td>
            <td class="px-6 py-4 text-center">
              <span class="px-3 py-1 ${o.payment_type === "Chuyển khoản" ? "bg-blue-50 text-blue-600" : "bg-gray-100 text-gray-600"} rounded-lg font-black text-[9px] uppercase tracking-tighter">
                ${o.payment_type || "Tiền mặt"}
              </span>
            </td>
            <td class="px-6 py-4 text-center">
              <button onclick="viewInvoice('${o.order_id}')" class="text-[10px] font-black text-blue-600 uppercase hover:underline">Xem</button>
            </td>
          </tr>`,
          )
          .join("");
      }

      // MODAL CHI TIẾT (GIỮ THEO UI KHOA HỌC BẠN ƯNG Ý)
      async function viewInvoice(id) {
        const order = await db.orders.get(id);
        const items = await db.order_items
          .where("order_id")
          .equals(id)
          .toArray();
        const content = document.getElementById("invoice-detail-content");

        content.innerHTML = `
          <div class="p-6 border-b border-gray-100 bg-gray-50/50">
            <div class="flex justify-between items-start mb-4">
              <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Mã hóa đơn</p>
                <h2 class="text-xl font-black text-gray-800 uppercase">${order.order_id}</h2>
              </div>
              <button onclick="closeInvoiceModal()" class="text-gray-400 hover:text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Người lập</p>
                <p class="text-[11px] font-bold text-gray-700 uppercase">${order.created_by || "Hệ thống"}</p>
              </div>
              <div class="text-right">
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Thời gian</p>
                <p class="text-[11px] font-bold text-gray-700">${new Date(order.created_at).toLocaleString()}</p>
              </div>
            </div>
          </div>

          <div class="p-0 max-h-[300px] overflow-y-auto custom-scrollbar">
            <table class="w-full text-left border-collapse">
              <thead class="sticky top-0 bg-white shadow-sm">
                <tr>
                  <th class="px-6 py-3 text-[9px] font-bold text-gray-400 uppercase">Sản phẩm</th>
                  <th class="px-4 py-3 text-[9px] font-bold text-gray-400 uppercase text-center">SL</th>
                  <th class="px-6 py-3 text-[9px] font-bold text-gray-400 uppercase text-right">Thành tiền</th>
                </tr>
              </thead>
              <tbody>
                ${items
                  .map(
                    (it) => `
                  <tr class="border-b border-gray-50">
                    <td class="px-6 py-3">
                      <p class="text-[11px] font-bold text-gray-800 uppercase">${it.product_id}</p>
                      <p class="text-[9px] text-gray-400 italic">${Number(it.price).toLocaleString()}đ</p>
                    </td>
                    <td class="px-4 py-3 text-[11px] font-bold text-gray-600 text-center">x${it.quantity}</td>
                    <td class="px-6 py-3 text-[11px] font-bold text-gray-800 text-right">${(it.price * it.quantity).toLocaleString()}đ</td>
                  </tr>`,
                  )
                  .join("")}
              </tbody>
            </table>
          </div>

          <div class="p-6 bg-white border-t border-gray-100">
            <div class="flex justify-between items-center mb-6">
              <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Tổng cộng</p>
                <p class="text-[9px] text-blue-600 font-bold uppercase tracking-tighter italic">PTTT: ${order.payment_type || "Tiền mặt"}</p>
              </div>
              <p class="text-2xl font-black text-blue-600">${Number(order.total_amount).toLocaleString()}đ</p>
            </div>
            <div class="flex gap-3">
              ${
                order.payment_type === "Chuyển khoản"
                  ? `
                <button onclick="reOpenQR(${order.total_amount})" class="flex-1 bg-blue-600 text-white py-3 rounded-xl text-[10px] font-bold uppercase hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">Xem mã QR</button>
              `
                  : ""
              }
              <button onclick="closeInvoiceModal()" class="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl text-[10px] font-bold uppercase hover:bg-gray-200 transition-all">Đóng</button>
            </div>
          </div>`;
        document
          .getElementById("invoice-detail-modal")
          .classList.remove("hidden");
      }

      function closeInvoiceModal() {
        document.getElementById("invoice-detail-modal").classList.add("hidden");
      }

      // QR LOGIC (GIỮ NGUYÊN)
      function reOpenQR(soTien) {
        let qrModal = document.getElementById("re-qr-modal");
        if (!qrModal) {
          const html = `
            <div id="re-qr-modal" class="fixed inset-0 z-[200] hidden bg-gray-900/40 backdrop-blur-md flex items-center justify-center p-6">
              <div class="bg-white rounded-[40px] shadow-2xl w-full max-w-sm p-8 flex flex-col items-center">
                <h2 class="text-sm font-black text-gray-800 uppercase mb-6 tracking-widest">Quét mã thanh toán</h2>
                <div class="w-full aspect-square bg-gray-50 rounded-3xl mb-6 flex items-center justify-center border border-gray-100 overflow-hidden">
                  <img id="re-qr-image" src="" class="w-full h-full object-contain p-4" />
                </div>
                <div class="text-center mb-6 w-full bg-blue-50 py-4 rounded-2xl">
                  <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Số tiền thu</p>
                  <p id="re-qr-amount" class="text-2xl font-black text-blue-600"></p>
                </div>
                <button onclick="document.getElementById('re-qr-modal').classList.add('hidden')" class="w-full py-3 bg-gray-100 text-gray-500 rounded-xl text-[10px] font-bold uppercase">Đóng</button>
              </div>
            </div>`;
          document.body.insertAdjacentHTML("beforeend", html);
          qrModal = document.getElementById("re-qr-modal");
        }

        const bankId = "970437",
          accountNo = "045704070016757",
          template = "compact2",
          accountName = "BENH%20VIEN%20DA%20KHOA%20BUU%20DIEN",
          description = "%20CK%20TIEN%20THUOC%20CS1";
        document.getElementById("re-qr-amount").innerText =
          soTien.toLocaleString() + "đ";
        document.getElementById("re-qr-image").src =
          `https://img.vietqr.io/image/${bankId}-${accountNo}-${template}.png?amount=${soTien}&addInfo=KHACH%20HANG${description}&accountName=${accountName}`;
        qrModal.classList.remove("hidden");
        qrModal.onclick = (e) => {
          if (e.target === qrModal) qrModal.classList.add("hidden");
        };
      }

      window.addEventListener("DOMContentLoaded", () => {
        document.getElementById("current-date").innerText =
          new Date().toLocaleDateString("vi-VN", {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric",
          });
        updateDashboardStats();
      });
    </script>
  </body>
