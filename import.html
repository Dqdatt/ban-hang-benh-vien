                  <th

    <script>
      function toggleDrop(id) {
        const drop = document.getElementById(id);
        const icon = document.getElementById(id + "-icon");
        drop.classList.toggle("hidden");
        icon.classList.toggle("rotate-180");
      }

      let dbProducts = [];
      let selectedIndex = -1;

      document.addEventListener("DOMContentLoaded", async () => {
        if (typeof AuthManager !== "undefined") {
          AuthManager.checkSession();
        }

        // Tải danh sách sản phẩm từ DB để làm gợi ý (Autocomplete)
        dbProducts = await db.products.toArray();

        // Tải và hiển thị lịch sử nhập hàng từ DB (giữ lại kể cả khi logout/f5)
        loadImportHistory();

        setupAutocomplete();
        setupPriceFormatting();
      });

      // Hàm tải lịch sử nhập hàng từ IndexedDB
      async function loadImportHistory() {
        try {
          // Lấy 50 bản ghi mới nhất từ bảng import_history
          const history = await db.import_history
            .orderBy("id")
            .reverse()
            .limit(50)
            .toArray();
          renderTable(history);
        } catch (err) {
          console.error("Không thể tải lịch sử nhập hàng:", err);
        }
      }

      function setupAutocomplete() {
        const input = document.getElementById("input-name");
        const list = document.getElementById("autocomplete-list");
        const unitInput = document.getElementById("input-unit");

        input.addEventListener("input", (e) => {
          const val = e.target.value.toUpperCase();
          list.innerHTML = "";
          selectedIndex = -1;

          if (!val) {
            list.classList.add("hidden");
            return;
          }

          const matches = dbProducts.filter((p) =>
            p.name.toUpperCase().includes(val),
          );

          if (matches.length > 0) {
            matches.forEach((p, index) => {
              const div = document.createElement("div");
              div.className =
                "px-4 py-3 text-[11px] font-bold uppercase cursor-pointer suggestion-item border-b border-gray-50 last:border-0 transition-colors";
              div.id = "suggestion-" + index;
              div.innerText = p.name;
              div.onclick = () => selectProduct(p);
              list.appendChild(div);
            });
            list.classList.remove("hidden");
          } else {
            list.classList.add("hidden");
          }
        });

        // XỬ LÝ PHÍM MŨI TÊN VÀ PHÍM RETURN (ENTER) CHO MAC
        input.addEventListener("keydown", (e) => {
          const items = list.getElementsByClassName("suggestion-item");

          if (!list.classList.contains("hidden") && items.length > 0) {
            if (e.key === "ArrowDown") {
              e.preventDefault();
              selectedIndex = (selectedIndex + 1) % items.length;
              updateSelection(items);
            } else if (e.key === "ArrowUp") {
              e.preventDefault();
              selectedIndex = (selectedIndex - 1 + items.length) % items.length;
              updateSelection(items);
            } else if (e.key === "Enter" || e.keyCode === 13) {
              if (selectedIndex > -1) {
                e.preventDefault(); // Chặn hành vi submit mặc định
                const selectedName = items[selectedIndex].innerText;
                const product = dbProducts.find((p) => p.name === selectedName);
                if (product) selectProduct(product);
              }
            }
          }
        });

        function updateSelection(items) {
          for (let i = 0; i < items.length; i++) {
            items[i].classList.remove("bg-blue-50", "text-blue-600");
          }
          if (selectedIndex > -1) {
            items[selectedIndex].classList.add("bg-blue-50", "text-blue-600");
            items[selectedIndex].scrollIntoView({ block: "nearest" });
          }
        }

        function selectProduct(p) {
          input.value = p.name;
          unitInput.value = p.type || ""; // Giữ nguyên định dạng ĐVT từ DB
          list.classList.add("hidden");
          selectedIndex = -1;

          // Tự động nhảy sang ô Số lượng và bôi đen để nhập nhanh
          setTimeout(() => {
            const qtyInput = document.getElementById("input-qty");
            qtyInput.focus();
            qtyInput.select();
          }, 10);
        }

        document.addEventListener("click", (e) => {
          if (e.target !== input) list.classList.add("hidden");
        });
      }

      function setupPriceFormatting() {
        const importPriceInput = document.getElementById("input-price");
        const sellPriceInput = document.getElementById("input-sell");
        const unitInput = document.getElementById("input-unit");

        importPriceInput.addEventListener("input", (e) => {
          let value = e.target.value.replace(/[^0-9]/g, "");
          if (value) {
            e.target.value = parseInt(value).toLocaleString();
          }
        });

        sellPriceInput.addEventListener("input", (e) => {
          let value = e.target.value.replace(/[^0-9]/g, "");
          if (value) {
            e.target.value = parseInt(value).toLocaleString();
          }
        });

        unitInput.addEventListener("input", (e) => {
          let value = e.target.value;
          if (value.length > 0) {
            // Viết hoa chữ đầu và giữ nguyên các chữ sau
            e.target.value = value.charAt(0).toUpperCase() + value.slice(1);
          }
        });
      }

      async function handleImport() {
        const name = document.getElementById("input-name").value.trim();
        const unit = document.getElementById("input-unit").value.trim();
        const qty = parseInt(document.getElementById("input-qty").value) || 0;
        const importPriceStr = document
          .getElementById("input-price")
          .value.replace(/,/g, "");
        const sellPriceStr = document
          .getElementById("input-sell")
          .value.replace(/,/g, "");

        const imPrice = parseInt(importPriceStr) || 0;
        const selPrice = parseInt(sellPriceStr) || 0;

        const note = document.getElementById("input-note").value;

        if (!name || qty <= 0 || imPrice <= 0)
          return alert("Vui lòng điền đủ thông tin!");

        try {
          // 1. Cập nhật tồn kho trong bảng products
          const existing = await db.products.where("name").equals(name).first();
          if (existing) {
            await db.products.update(existing.id, {
              stock: (existing.stock || 0) + qty,
              total_import: (existing.total_import || 0) + qty,
              import_price: imPrice,
              sell_price: selPrice,
              type: unit,
            });
          } else {
            await db.products.add({
              name: name,
              type: unit,
              stock: qty,
              stock_initial: 0,
              total_import: qty,
              total_export: 0,
              import_price: imPrice,
              sell_price: selPrice,
              status: "Đủ hàng",
            });
          }

          // 2. Tạo chuỗi thời gian đầy đủ (Ngày/Tháng/Năm Giờ:Phút:Giây)
          const now = new Date();
          const timeStr = `${now.getDate().toString().padStart(2, "0")}/${(now.getMonth() + 1).toString().padStart(2, "0")}/${now.getFullYear()} ${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}:${now.getSeconds().toString().padStart(2, "0")}`;

          // 3. Lưu vào bảng import_history để giữ lịch sử vĩnh viễn
          await db.import_history.add({
            name,
            unit,
            qty,
            imPrice: imPrice,
            selPrice: selPrice,
            note,
            time: timeStr,
            total: qty * imPrice,
            user_id: localStorage.getItem("currentUser"),
          });

          // 4. Cập nhật lại UI
          dbProducts = await db.products.toArray();
          loadImportHistory();

          // 5. Reset form và tự động focus về ô tên thuốc
          document.getElementById("input-name").value = "";
          document.getElementById("input-unit").value = "";
          document.getElementById("input-qty").value = "1";
          document.getElementById("input-price").value = "";
          document.getElementById("input-sell").value = "";
          document.getElementById("input-note").value = "";
          document.getElementById("input-name").focus();
        } catch (err) {
          console.error("Lỗi khi xử lý nhập kho:", err);
        }
      }

      function renderTable(data) {
        const tbody = document.getElementById("import-tbody");
        if (!data || data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" class="py-20 text-center text-gray-400 font-bold uppercase text-[10px]">Chưa có dữ liệu nhập hàng</td></tr>`;
          return;
        }

        tbody.innerHTML = data
          .map(
            (item, index) => `
                <tr class="hover:bg-blue-50/20 border-b border-gray-50 transition-all group">
                    <td class="px-2 py-2.5 text-center text-[11px] font-medium text-gray-400">${index + 1}</td>
                    <td class="px-2 py-2.5 font-semibold text-gray-800 uppercase text-[11px]">${item.name}</td>
                    <td class="px-2 py-2.5 text-center text-gray-800 font-medium text-[11px]">${item.unit}</td>
                    <td class="px-2 py-2.5 text-center font-bold text-gray-800 text-[11px] bg-gray-50/50">${item.qty}</td>
                    <td class="px-2 py-2.5 text-right font-medium text-gray-800 text-[11px]">${(item.imPrice || 0).toLocaleString()}</td>
                    <td class="px-2 py-2.5 text-right font-medium text-gray-800 text-[11px]">${(item.selPrice || 0).toLocaleString()}</td>
                    <td class="px-2 py-2.5 text-right font-bold text-gray-800 text-[11px]">${(item.total || 0).toLocaleString()}đ</td>
                    <td class="px-2 py-2.5 text-center text-gray-800 font-medium text-[11px] uppercase whitespace-nowrap">${item.time}</td>
                    <td class="px-4 py-2.5 text-[11px] italic text-gray-800 font-medium">${item.note || ""}</td>
                </tr>
            `,
          )
          .join("");
      }
    </script>
  </body>
</html>
