<div
  id="qr-modal"
  class="fixed inset-0 z-[110] hidden bg-gray-900/80 backdrop-blur-lg flex items-center justify-center p-6"
>
  <div
    class="bg-white rounded-[48px] shadow-2xl w-full max-w-md overflow-hidden p-8 flex flex-col items-center animate-in zoom-in duration-300"
  >
    <h2 class="text-xl font-black text-gray-800 uppercase mb-2">
      Quét mã thanh toán
    </h2>
    <p class="text-xs text-gray-400 font-bold mb-6 tracking-widest uppercase">
      VietQR - Chuyển khoản nhanh 24/7
    </p>

    <div
      class="relative w-full aspect-square bg-gray-50 rounded-[32px] border-4 border-blue-50 flex items-center justify-center overflow-hidden mb-6 shadow-inner"
    >
      <img
        id="qr-image"
        src=""
        alt="VietQR"
        class="w-full h-full object-contain p-4 opacity-0 transition-opacity duration-300"
      />
      <div
        id="qr-loading"
        class="absolute inset-0 flex items-center justify-center bg-gray-50"
      >
        <div
          class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"
        ></div>
      </div>
    </div>

    <div class="text-center mb-8 w-full bg-blue-50/50 py-4 rounded-2xl">
      <p
        class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1"
      >
        Số tiền cần thu
      </p>
      <p id="qr-amount-display" class="text-3xl font-black text-blue-600">0đ</p>
    </div>

    <button
      onclick="orderManager.closeQRModal()"
      class="w-full py-5 bg-gray-900 text-white rounded-[24px] font-black text-lg uppercase tracking-widest hover:bg-black transition-all shadow-xl active:scale-95"
    >
      Xác nhận đã nhận tiền
    </button>

    <button
      onclick="orderManager.backToPayment()"
      class="mt-4 text-[10px] font-bold text-gray-400 uppercase hover:text-blue-600 transition-colors"
    >
      ← Quay lại thay đổi phương thức
    </button>
  </div>
</div>
