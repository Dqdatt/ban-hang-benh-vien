<div
  id="payment-modal"
  class="fixed inset-0 z-[100] hidden bg-gray-900/60 backdrop-blur-md flex items-center justify-center p-6"
>
  <div
    class="bg-white rounded-[48px] shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col md:flex-row p-4 gap-4 animate-in zoom-in duration-200"
  >
    <div class="flex-[1.2] p-8 flex flex-col justify-between">
      <div>
        <h1
          class="text-3xl font-black text-gray-900 uppercase tracking-tight mb-6"
        >
          Xác nhận thanh toán
        </h1>

        <div
          class="flex justify-between items-end mb-10 pb-6 border-b border-gray-100"
        >
          <div>
            <p
              class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1"
            >
              Mã hóa đơn
            </p>
            <p
              id="modal-order-id"
              class="text-lg font-normal text-gray-500 not-italic"
            >
              A26T04-XXXXXX
            </p>
          </div>
          <div class="text-right">
            <p
              class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1"
            >
              Thành tiền
            </p>
            <p
              id="modal-total-amount"
              class="text-3xl font-black text-blue-600"
            >
              0đ
            </p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <button
            id="btn-cash"
            onclick="orderManager.selectPayment('cash')"
            class="py-10 border-2 border-gray-100 rounded-[32px] font-bold text-lg uppercase transition-all flex flex-col items-center gap-3 bg-white text-gray-900 hover:bg-gray-50 disabled:cursor-not-allowed"
          >
            <span class="text-3xl">💵</span> Tiền mặt
          </button>
          <button
            id="btn-transfer"
            onclick="orderManager.selectPayment('transfer')"
            class="py-10 border-2 border-gray-100 rounded-[32px] font-bold text-lg uppercase transition-all flex flex-col items-center gap-3 bg-white text-gray-900 hover:bg-gray-50 disabled:cursor-not-allowed"
          >
            <span class="text-3xl">🏦</span> Chuyển khoản
          </button>
        </div>
      </div>

      <button
        onclick="orderManager.closePaymentModal()"
        class="text-[11px] font-bold text-gray-400 uppercase hover:text-red-500 transition-colors mt-8 self-start"
      >
        ✕ Quay lại màn hình bán hàng
      </button>
    </div>

    <div class="flex-1 flex flex-col gap-4 p-2">
      <button
        id="btn-print"
        disabled
        onclick="orderManager.finishOrder(true)"
        class="flex-1 bg-gray-100 text-gray-400 rounded-[32px] font-black text-xl uppercase tracking-wider transition-all flex items-center justify-center text-center px-6"
      >
        In hoá đơn
      </button>

      <button
        id="btn-no-print"
        disabled
        onclick="orderManager.finishOrder(false)"
        class="flex-[1.8] bg-gray-800 text-white rounded-[32px] font-black text-2xl uppercase tracking-wider transition-all flex items-center justify-center text-center px-6 shadow-2xl shadow-gray-200"
      >
        Không in<br />hoá đơn
      </button>
    </div>
  </div>
</div>
