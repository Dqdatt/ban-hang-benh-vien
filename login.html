<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | Hệ thống Quản lý Nhà thuốc Nội bộ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="database.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232563eb'><path d='M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z'/></svg>"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
      }
      .bg-medical {
        background-color: #f8fafc;
      }
    </style>
  </head>
  <body class="bg-medical flex items-center justify-center min-h-screen">
    <div
      class="w-full max-w-md p-8 bg-white rounded-2xl shadow-sm border border-gray-100"
    >
      <div class="text-center mb-10">
        <div
          class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-4"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"
            />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">HỆ THỐNG NHÀ THUỐC</h1>
        <p
          class="text-gray-500 text-sm mt-2 font-medium uppercase tracking-wider"
        >
          Quản lý lưu hành nội bộ
        </p>
      </div>

      <form id="login-form" action="#" method="POST" class="space-y-6">
        <div>
          <label
            for="username"
            class="block text-sm font-semibold text-gray-700 mb-2"
            >Tên đăng nhập</label
          >
          <input
            type="text"
            id="username"
            name="username"
            required
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all duration-200 text-gray-600"
            placeholder="Nhập tài khoản..."
          />
        </div>

        <div>
          <div class="flex justify-between mb-2">
            <label
              for="password"
              class="block text-sm font-semibold text-gray-700"
              >Mật khẩu</label
            >
            <a
              href="#"
              class="text-xs text-blue-600 hover:underline font-medium"
              >Quên mật khẩu?</a
            >
          </div>
          <input
            type="password"
            id="password"
            name="password"
            required
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all duration-200 text-gray-600"
            placeholder="••••••••"
          />
        </div>

        <div class="flex items-center">
          <input
            type="checkbox"
            id="remember"
            class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <label for="remember" class="ml-2 text-sm text-gray-600"
            >Ghi nhớ phiên đăng nhập</label
          >
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 transition-all duration-200 transform active:scale-[0.98]"
        >
          ĐĂNG NHẬP
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-gray-50 text-center">
        <p class="text-xs text-gray-400 font-medium tracking-tight">
          © 2026 BENH VIEN DA KHOA BUU DIEN. <br />Hệ thống vận hành cục bộ.
        </p>
      </div>
    </div>

    <script type="module">
      async function startLogin() {
        const form = document.getElementById("login-form");
        if (!form) return;

        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          // Kiểm tra AuthManager từ database.js (đã được gán vào window)
          if (!window.AuthManager) {
            alert("Hệ thống đang khởi tạo, vui lòng thử lại sau 1 giây...");
            return;
          }

          const user = document.getElementById("username").value;
          const pass = document.getElementById("password").value;

          try {
            const success = await window.AuthManager.login(user, pass);
            if (success) {
              window.location.href = "pos.html";
            } else {
              alert("Sai tài khoản hoặc mật khẩu!");
            }
          } catch (err) {
            console.error(err);
            alert("Lỗi kết nối cơ sở dữ liệu!");
          }
        });
      }
      startLogin();
    </script>
  </body>
</html>
